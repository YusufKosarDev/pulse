server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API and server-sent events, proxied to ingest-service on the internal
    # network. Same origin as the page, so the browser needs no CORS grant.
    location /api/ {
        proxy_pass http://ingest-service:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Server-sent events (/api/stream): keep the connection open and do not
        # buffer, so events reach the browser as they are produced.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
