spring:
  application:
    name: ingest-service
  # Local dev credentials come from the repo-root .env file (never hardcoded here).
  config:
    import: "optional:file:../.env[.properties]"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true

server:
  port: 8081

pulse:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  stream:
    key: metrics
    group: pulse-ingest
    consumer: ingest-1
