spring:
  application:
    name: ingest-service
  # Local dev credentials come from the repo-root .env file (never hardcoded here).
  config:
    import: "optional:file:../.env[.properties]"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}

server:
  port: 8081

pulse:
  anomalies:
    # Which detector's findings the dashboard shows while detectors run side by side.
    display-detector: ${DISPLAY_DETECTOR:ewma}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  events:
    # Pub/sub channel ml-service publishes dashboard events on.
    channel: ${EVENTS_CHANNEL:pulse-events}
  notifications:
    # Alert lifecycle events are POSTed here as JSON; empty disables webhooks.
    webhook-url: ${WEBHOOK_URL:}
    email:
      # Alert lifecycle events are mailed here; needs SMTP_HOST as well.
      to: ${ALERT_EMAIL_TO:}
      from: ${ALERT_EMAIL_FROM:pulse@localhost}
  stream:
    key: metrics
    group: pulse-ingest
    consumer: ingest-1
    dlq-key: ${DLQ_KEY:metrics-dlq}
    reclaim:
      min-idle-ms: ${RECLAIM_MIN_IDLE_MS:60000}
      interval-ms: ${RECLAIM_INTERVAL_MS:30000}
      max-deliveries: ${RECLAIM_MAX_DELIVERIES:5}
